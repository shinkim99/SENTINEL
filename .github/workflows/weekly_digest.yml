name: SENTINEL Weekly Digest

# 서버리스 주간 다이제스트:
#  - schedule(매주 월 07:00 KST = 22:00 UTC 일요일)는 항상 draft(운영자 본인)로 발송 + 대시보드 Pages 갱신.
#  - 본부 발송은 workflow_dispatch(mode=send) 수동 트리거로만.
#  - registry.json 은 실행 후 레포에 commit & push (다음 주 diff 기준 보존).

on:
  schedule:
    # GitHub Actions cron 은 UTC. 월요일 07:00 KST = 일요일 22:00 UTC.
    - cron: "0 22 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: "발송 모드: draft(본인 검토) | send(본부 전체)"
        required: true
        default: "draft"
        type: choice
        options:
          - draft
          - send

permissions:
  contents: write      # registry.json 커밋 & push
  pages: write         # GitHub Pages 배포
  id-token: write      # Pages OIDC

# 동시 실행 방지 (registry.json push 충돌 방지)
concurrency:
  group: weekly-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (최신 master — registry.json 포함)
        uses: actions/checkout@v4
        with:
          # workflow_dispatch의 ref_name은 브랜치명(master).
          # 명시적으로 지정하여 항상 HEAD를 가져옴.
          ref: ${{ github.ref_name }}

      - name: Debug — registry 사전 확인
        run: |
          echo "=== checkout SHA ==="
          git log --oneline -3
          echo ""
          echo "=== data/state/ 목록 ==="
          ls -la data/state/ 2>/dev/null || echo "(data/state/ 없음 — 첫 실행)"
          echo ""
          echo "=== registry.json 규제 수 ==="
          python3 -c "
          import json, pathlib
          p = pathlib.Path('data/state/registry.json')
          if not p.exists():
            print('registry.json 없음 — 전부 신규 처리 예정')
          else:
            d = json.loads(p.read_text())
            regs = d.get('regulations', [])
            print(f'registry.json 존재 — {len(regs)}건 로드 예정')
            if regs:
              print('첫 항목 ID:', regs[0].get('regulation_id'))
          " 2>/dev/null || echo "(Python 파싱 실패)"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          # schedule 트리거는 입력이 없으므로 항상 draft. dispatch 는 선택 입력.
          MODE: ${{ github.event.inputs.mode || 'draft' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LAW_GO_KR_API_KEY: ${{ secrets.LAW_GO_KR_API_KEY }}
          DIGEST_RECIPIENTS: ${{ secrets.DIGEST_RECIPIENTS }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # 대시보드 CTA 공개 URL (Pages). secret 아님 — 워크플로우 env.
          DASHBOARD_URL: "https://shinkim99.github.io/SENTINEL/"
        run: |
          echo "mode=$MODE"
          python -m scripts.run_digest --mode "$MODE"

      - name: Commit registry baseline
        run: |
          git config user.name "sentinel-bot"
          git config user.email "actions@github.com"
          git add data/state/registry.json

          if git diff --staged --quiet; then
            echo "registry 변경 없음 — 커밋 건너뜀"
          else
            WEEK=$(date -u +%Y-%U)
            git commit -m "chore: weekly registry update ($WEEK) [skip ci]"

            # push 실패 시 명시적으로 워크플로우를 실패시킴.
            # (silent failure 방지 — push가 실패하면 다음 실행이 stale registry를 보게 됨)
            git push || {
              echo "::error::git push failed — registry.json이 저장되지 않아 다음 실행이 초기화됩니다."
              echo "::error::원인: 다른 커밋이 push 사이에 발생했을 가능성. git pull --rebase 후 재시도 필요."
              exit 1
            }

            echo "registry 커밋 완료 ✓"
            git log --oneline -2
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
