name: SENTINEL Weekly Digest

# 트리거 3종:
#  1. schedule  : 매주 월 07:00 KST(= 일 22:00 UTC) — draft 자동 발송.
#  2. push      : data/inbox/kr_latest.json 변경 시 자동 실행 — draft.
#                 회사 PC 에서 collect_kr.bat push → 다이제스트 자동 트리거.
#                 registry 자동커밋([skip ci])은 paths 한정으로 재트리거 안 됨.
#  3. dispatch  : 수동 트리거 — mode 선택 가능.

on:
  schedule:
    # GitHub Actions cron 은 UTC. 월요일 07:00 KST = 일요일 22:00 UTC.
    - cron: "0 22 * * 0"

  push:
    branches:
      - master
    paths:
      - "data/inbox/kr_latest.json"

  workflow_dispatch:
    inputs:
      mode:
        description: "발송 모드: draft(본인 검토) | send(본부 전체)"
        required: true
        default: "draft"
        type: choice
        options:
          - draft
          - send

permissions:
  contents: write      # registry.json 커밋 & push
  pages: write         # GitHub Pages 배포
  id-token: write      # Pages OIDC

# 동시 실행 방지.
# cancel-in-progress: false → 실행 중인 run 이 있으면 새 run 은 큐에서 대기,
# 취소되지 않고 순서대로 실행됨. registry.json 충돌 근본 원인 차단.
# (큐 대기 중 또 다른 트리거가 오면 대기 run 이 교체됨 — GitHub 동작 사양)
concurrency:
  group: weekly-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (최신 master — registry.json + kr_latest.json 포함)
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Debug — 사전 확인
        run: |
          echo "=== 트리거: ${{ github.event_name }} ==="
          echo "=== checkout SHA ==="
          git log --oneline -3
          echo ""
          echo "=== data/inbox/ 목록 ==="
          ls -la data/inbox/ 2>/dev/null || echo "(data/inbox/ 없음 — KR 수집 전)"
          echo ""
          echo "=== data/state/ 목록 ==="
          ls -la data/state/ 2>/dev/null || echo "(data/state/ 없음 — 첫 실행)"
          echo ""
          echo "=== registry.json 규제 수 ==="
          python3 -c "
          import json, pathlib
          p = pathlib.Path('data/state/registry.json')
          if not p.exists():
            print('registry.json 없음 — 전부 신규 처리 예정')
          else:
            d = json.loads(p.read_text())
            regs = d.get('regulations', [])
            print(f'registry.json 존재 — {len(regs)}건 로드 예정')
            if regs:
              print('첫 항목 ID:', regs[0].get('regulation_id'))
          " 2>/dev/null || echo "(Python 파싱 실패)"
          echo ""
          echo "=== kr_latest.json 상태 ==="
          python3 -c "
          import json, pathlib
          p = pathlib.Path('data/inbox/kr_latest.json')
          if not p.exists():
            print('kr_latest.json 없음 — KR collection_failure 예정 (US/EU 는 정상)')
          else:
            d = json.loads(p.read_text())
            print(f'week={d.get(\"week\")}, collected_at={d.get(\"collected_at\")}, items={len(d.get(\"items\",[]))}')
          " 2>/dev/null || echo "(Python 파싱 실패)"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          # schedule/push 트리거는 inputs 없음 → 항상 draft.
          # dispatch 는 선택 입력.
          MODE: ${{ github.event.inputs.mode || 'draft' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DIGEST_RECIPIENTS: ${{ secrets.DIGEST_RECIPIENTS }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # 대시보드 CTA 공개 URL (Pages). secret 아님.
          DASHBOARD_URL: "https://shinkim99.github.io/SENTINEL/"
        run: |
          echo "mode=$MODE  trigger=${{ github.event_name }}"
          python -m scripts.run_digest --mode "$MODE"

      - name: Commit registry baseline
        run: |
          git config user.name "sentinel-bot"
          git config user.email "actions@github.com"
          git add data/state/registry.json

          if git diff --staged --quiet; then
            echo "registry 변경 없음 — 커밋 건너뜀"
            exit 0
          fi

          WEEK=$(date -u +%Y-%U)
          git commit -m "chore: weekly registry update ($WEEK) [skip ci]"

          # ── push + pull --rebase 재시도 루프 ────────────────────────────
          # 다이제스트 실행 중 외부 push(kr_latest.json 등)가 원격에 쌓이면
          # fetch-first 거부가 발생한다. pull --rebase 로 재적용 후 재push.
          # registry.json 단독 충돌은 이번 실행 버전(--theirs)으로 자동 해결.
          MAX_RETRIES=3
          PUSHED=false

          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "--- registry push 시도 $attempt/$MAX_RETRIES ---"

            # 원격 최신 커밋을 가져와 우리 커밋을 그 위에 재적용
            PULL_OK=true
            git pull --rebase origin master || PULL_OK=false

            if [ "$PULL_OK" = false ]; then
              # 충돌 파일 목록 확인
              CONFLICTS=$(git diff --name-only --diff-filter=U 2>/dev/null || echo "")

              if [ "$CONFLICTS" = "data/state/registry.json" ]; then
                # registry.json 단독 충돌 → 이번 실행 버전(theirs=재적용 중인 커밋)으로 해결
                # rebase 에서 --theirs = 재적용 중인 커밋(우리 것), --ours = rebase 기반(원격)
                echo "registry.json 충돌 감지 — 이번 실행 버전으로 자동 해결 (--theirs)"
                git checkout --theirs data/state/registry.json
                git add data/state/registry.json
                GIT_EDITOR=true git rebase --continue || {
                  echo "::error::rebase --continue 실패"
                  git rebase --abort || true
                  exit 1
                }

              elif [ -z "$CONFLICTS" ]; then
                # 충돌 없는 pull 실패 (네트워크 등) — 재시도
                echo "git pull 실패 (충돌 아님) — 재시도"
                git rebase --abort 2>/dev/null || true

              else
                # registry.json 외 다른 파일 충돌 → 자동 해결 불가
                echo "::error::예상 외 충돌 파일: $CONFLICTS — 자동 해결 불가. 수동 확인 필요."
                git rebase --abort || true
                exit 1
              fi
            fi

            # push 시도
            if git push; then
              PUSHED=true
              break
            fi

            # push 거부 → 다음 시도 전 대기 (5s, 10s)
            if [ $attempt -lt $MAX_RETRIES ]; then
              SLEEP=$((attempt * 5))
              echo "push 거부 — ${SLEEP}s 대기 후 재시도..."
              sleep $SLEEP
            fi
          done

          if [ "$PUSHED" = false ]; then
            echo "::error::registry push $MAX_RETRIES 회 모두 실패 — registry.json 저장 불가."
            exit 1
          fi

          echo "registry 커밋 완료 ✓"
          git log --oneline -3

      - name: Copy static assets into public/
        run: |
          mkdir -p public/ico
          cp ico/* public/ico/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
