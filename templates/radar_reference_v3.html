<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SENTINEL Regulatory Radar — Reference v3</title>
  <style>
    :root {
      --bg: #F0F4F8; --surface: #FFFFFF; --surface2: #F8FAFC;
      --border: #E2E8F0; --text: #1E293B; --text2: #64748B; --text3: #94A3B8;
      --accent: #0F2944; --accent-hi: #38BDF8; --shadow: rgba(0,0,0,.07);
    }
    [data-theme="dark"] {
      --bg: #0A0F1E; --surface: #161D2E; --surface2: #1E293B;
      --border: #2D3748; --text: #E2E8F0; --text2: #94A3B8; --text3: #64748B;
      --accent: #38BDF8; --accent-hi: #7DD3FC; --shadow: rgba(0,0,0,.4);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;}

    /* ── topbar ── */
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);
      padding:12px 24px;display:flex;align-items:center;gap:12px;
      position:sticky;top:0;z-index:100;box-shadow:0 1px 4px var(--shadow);}
    .logo{font-weight:800;font-size:18px;color:var(--accent);letter-spacing:-.5px;}
    .badge{display:inline-block;font-size:11px;font-weight:700;
      padding:3px 10px;border-radius:12px;}
    .badge-total{background:#DBEAFE;color:#1E40AF;}
    .badge-changed{background:#FEF3C7;color:#92400E;}
    .spacer{flex:1;}
    .topbar-meta{font-size:11px;color:var(--text3);}

    /* ── controls ── */
    .controls{background:var(--surface2);border-bottom:1px solid var(--border);
      padding:10px 24px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .filter-group{display:flex;gap:4px;flex-wrap:wrap;}
    .filter-btn{background:var(--surface);border:1px solid var(--border);
      color:var(--text2);font-size:12px;padding:5px 12px;border-radius:6px;
      cursor:pointer;transition:all .15s;line-height:1;}
    .filter-btn:hover{border-color:var(--accent);color:var(--accent);}
    .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
    [data-theme="dark"] .filter-btn.active{color:#0A0F1E;}
    .sep{height:22px;width:1px;background:var(--border);flex-shrink:0;}
    .view-toggle{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
    .view-btn{padding:5px 14px;font-size:12px;background:var(--surface);
      color:var(--text2);cursor:pointer;border:none;transition:all .15s;line-height:1;}
    .view-btn.active{background:var(--accent);color:#fff;}
    [data-theme="dark"] .view-btn.active{color:#0A0F1E;}
    .theme-btn{background:var(--surface);border:1px solid var(--border);
      color:var(--text2);font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;}

    /* ── count bar ── */
    .count-bar{padding:10px 24px 0;font-size:12px;color:var(--text3);}

    /* ── card view ── */
    #card-view{padding:16px 24px 32px;}
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;}
    .reg-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
      padding:16px;cursor:pointer;transition:box-shadow .15s,transform .1s;position:relative;}
    .reg-card:hover{box-shadow:0 4px 18px var(--shadow);transform:translateY(-2px);}
    .reg-card.changed{border-left:4px solid #F59E0B;}
    .changed-tag{position:absolute;top:10px;right:10px;background:#FEF3C7;color:#92400E;
      font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
    .card-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
    .card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;line-height:1.4;}
    .card-meta{font-size:11px;color:var(--text2);margin-bottom:6px;}
    .card-summary{font-size:12px;color:var(--text2);line-height:1.5;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

    /* ── table view ── */
    #table-view{padding:16px 24px 32px;display:none;overflow-x:auto;}
    .reg-table{width:100%;border-collapse:collapse;min-width:760px;}
    .reg-table th{background:var(--surface2);font-size:11px;font-weight:700;
      color:var(--text2);padding:9px 12px;text-align:left;
      border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:0;}
    .reg-table td{padding:10px 12px;border-bottom:1px solid var(--border);
      font-size:12px;vertical-align:middle;}
    .reg-table tr:hover td{background:var(--surface2);cursor:pointer;}
    .name-cell{font-weight:600;color:var(--text);max-width:260px;}
    .summary-cell{max-width:200px;color:var(--text2);
      overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}

    /* ── modal ── */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);
      z-index:200;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--surface);border-radius:12px;max-width:560px;width:90%;
      max-height:82vh;overflow:auto;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
    .modal-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;}
    .modal-title{font-size:16px;font-weight:700;flex:1;line-height:1.4;}
    .modal-close{background:none;border:none;font-size:20px;cursor:pointer;
      color:var(--text2);padding:0;flex-shrink:0;}
    .modal-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
    .modal-impact{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.5;}
    .modal-src{font-size:12px;color:var(--text3);margin-bottom:16px;}
    .timeline-label{font-size:12px;font-weight:700;color:var(--text);margin-bottom:10px;}
    .timeline{position:relative;padding-left:22px;}
    .timeline::before{content:'';position:absolute;left:7px;top:4px;bottom:4px;
      width:2px;background:var(--border);}
    .tl-item{position:relative;margin-bottom:16px;}
    .tl-dot{position:absolute;left:-18px;top:4px;width:10px;height:10px;
      border-radius:50%;background:var(--accent);border:2px solid var(--surface);}
    .tl-date{font-size:11px;color:var(--text3);margin-bottom:3px;}
    .tl-note{font-size:13px;color:var(--text);line-height:1.4;}
    .tl-src{font-size:11px;color:var(--text3);margin-top:2px;}

    /* ── empty state ── */
    .empty{text-align:center;padding:60px 24px;color:var(--text3);}
    .empty-icon{font-size:40px;margin-bottom:8px;}
    .empty p{font-size:14px;}

    /* ── badge color classes ── */
    .lc-proposed{background:#DBEAFE;color:#1E40AF;}
    .lc-enacted{background:#FEF3C7;color:#92400E;}
    .lc-in_force{background:#D1FAE5;color:#065F46;}
    .lc-amended{background:#EDE9FE;color:#5B21B6;}
    .lc-repealed{background:#FEE2E2;color:#991B1B;}
    .lc-unclear{background:#F3F4F6;color:#374151;}
    .al-urgent{background:#FEE2E2;color:#991B1B;}
    .al-watch{background:#FEF9C3;color:#854D0E;}
    .al-opp{background:#D1FAE5;color:#065F46;}
    .al-mon{background:#F3F4F6;color:#374151;}
    .dm-secondary_battery{background:#EFF6FF;color:#1E40AF;}
    .dm-green_eco{background:#ECFDF5;color:#065F46;}
    .dm-hydrogen{background:#FFF7ED;color:#9A3412;}
    .dm-space_environment{background:#F5F3FF;color:#5B21B6;}
    .ct-EU{background:#FEF3C7;color:#92400E;}
    .ct-US{background:#DBEAFE;color:#1E40AF;}
    .ct-KR{background:#FEE2E2;color:#991B1B;}
    .ct-CN{background:#FCE7F3;color:#9D174D;}
    .ct-default{background:#F3F4F6;color:#374151;}
    .cf-A{color:#065F46;font-weight:700;}
    .cf-B{color:#92400E;}
    .cf-C{color:#94A3B8;}
  </style>
</head>

<!-- ── CONTROLS ── -->
<div class="controls">
  <div class="filter-group" id="domain-filters">

<script>
// ── label/class maps ──
var LC_LABEL={proposed:'입법예고',enacted:'공포',in_force:'시행',amended:'개정',repealed:'폐지',unclear:'불명확'};
var LC_CLASS={proposed:'lc-proposed',enacted:'lc-enacted',in_force:'lc-in_force',amended:'lc-amended',repealed:'lc-repealed',unclear:'lc-unclear'};
var AL_LABEL={urgent:'긴급',watch:'주시',opp:'기회',mon:'모니터링'};
var AL_CLASS={urgent:'al-urgent',watch:'al-watch',opp:'al-opp',mon:'al-mon'};
var DM_LABEL={secondary_battery:'2차전지',green_eco:'친환경',hydrogen:'수소',space_environment:'우주환경'};
var DM_ICON={secondary_battery:'🔋',green_eco:'🌿',hydrogen:'⚡',space_environment:'🛸'};
var CT_LABEL={EU:'EU',US:'미국',KR:'한국',CN:'중국',JP:'일본',INTL:'국제'};
function ctClass(c){var m={EU:'ct-EU',US:'ct-US',KR:'ct-KR',CN:'ct-CN'};return m[c]||'ct-default';}

// ── state ──
var activeDomain='all', activeCountry='all', currentView='card', isDark=false;

function filtered(){
  return REG.filter(function(r){
    if(activeDomain!=='all' && r.domain!==activeDomain) return false;
    if(activeCountry!=='all' && r.country!==activeCountry) return false;
    return true;
  });
}

function bdg(text, cls){
  return '<span class="badge '+esc(cls)+'">'+esc(String(text))+'</span>';
}

// ── card render ──
function renderCards(){
  var items=filtered(), grid=document.getElementById('card-grid');
  var empty=document.getElementById('card-empty');
  updateCountBar(items.length);
  if(!items.length){grid.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  grid.innerHTML=items.map(function(r){
    var ch=r.changed_this_week;
    return '<div class="reg-card'+(ch?' changed':'')+'" onclick="openModal(\''+esc(r.regulation_id)+'\')">'
      +(ch?'<span class="changed-tag">이번 주 ★</span>':'')
      +'<div class="card-badges">'
      +bdg((DM_ICON[r.domain]||'')+' '+(DM_LABEL[r.domain]||r.domain),'badge dm-'+r.domain)
      +bdg(CT_LABEL[r.country]||r.country,'badge '+ctClass(r.country))
      +bdg(LC_LABEL[r.lifecycle_stage]||r.lifecycle_stage,'badge '+(LC_CLASS[r.lifecycle_stage]||'lc-unclear'))
      +bdg(AL_LABEL[r.alert]||r.alert,'badge '+(AL_CLASS[r.alert]||'al-mon'))
      +'</div>'
      +'<div class="card-title">'+esc(r.name)+'</div>'
      +'<div class="card-meta">'+esc(CT_LABEL[r.country]||r.country)+' &nbsp;|&nbsp; '+esc(r.date_text)+'</div>'
      +'<div class="card-summary">'+esc(r.summary)+'</div>'
      +'</div>';
  }).join('');
}

// ── table render ──
function renderTable(){
  var items=filtered(), tbody=document.getElementById('table-body');
  var empty=document.getElementById('table-empty');
  updateCountBar(items.length);
  if(!items.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  tbody.innerHTML=items.map(function(r){
    return '<tr onclick="openModal(\''+esc(r.regulation_id)+'\')">'
      +'<td class="name-cell">'+esc(r.name)+(r.changed_this_week?' '+bdg('이번주','badge al-watch'):'')+'</td>'
      +'<td>'+bdg((DM_ICON[r.domain]||'')+' '+(DM_LABEL[r.domain]||r.domain),'badge dm-'+r.domain)+'</td>'
      +'<td>'+bdg(CT_LABEL[r.country]||r.country,'badge '+ctClass(r.country))+'</td>'
      +'<td>'+bdg(LC_LABEL[r.lifecycle_stage]||r.lifecycle_stage,'badge '+(LC_CLASS[r.lifecycle_stage]||'lc-unclear'))+'</td>'
      +'<td>'+bdg(AL_LABEL[r.alert]||r.alert,'badge '+(AL_CLASS[r.alert]||'al-mon'))+'</td>'
      +'<td class="summary-cell">'+esc(r.rd_impact)+'</td>'
      +'<td><span class="cf-'+esc(r.confidence)+'">'+esc(r.confidence)+'</span></td>'
      +'<td style="white-space:nowrap">'+esc(r.checked_at)+'</td>'
      +'<td style="text-align:center">'+(r.changed_this_week?'★':'—')+'</td>'
      +'</tr>';
  }).join('');
}

// ── modal ──
function openModal(id){
  var r=REG.find(function(x){return x.regulation_id===id;});
  if(!r) return;
  document.getElementById('modal-title').textContent=r.name;
  document.getElementById('modal-badges').innerHTML=
    bdg((DM_ICON[r.domain]||'')+' '+(DM_LABEL[r.domain]||r.domain),'badge dm-'+r.domain)+' '
    +bdg(CT_LABEL[r.country]||r.country,'badge '+ctClass(r.country))+' '
    +bdg(LC_LABEL[r.lifecycle_stage]||r.lifecycle_stage,'badge '+(LC_CLASS[r.lifecycle_stage]||'lc-unclear'))+' '
    +bdg(AL_LABEL[r.alert]||r.alert,'badge '+(AL_CLASS[r.alert]||'al-mon'));
  document.getElementById('modal-impact').textContent=r.rd_impact;
  document.getElementById('modal-src').innerHTML=
    '출처: '+esc(r.source)+'&nbsp;|&nbsp;<a href="'+esc(r.source_url)+'" target="_blank" '
    +'style="color:#0369A1;text-decoration:none;">원문 →</a>'
    +'&nbsp;|&nbsp; 신뢰도: <span class="cf-'+esc(r.confidence)+'">'+esc(r.confidence)+'</span>'
    +'&nbsp;|&nbsp; 확인일: '+esc(r.checked_at);
  var hist=(r.history||[]).slice().sort(function(a,b){return b.date.localeCompare(a.date);});
  document.getElementById('modal-timeline').innerHTML=hist.length
    ?hist.map(function(h){
      return '<div class="tl-item">'
        +'<div class="tl-dot"></div>'
        +'<div class="tl-date">'+esc(h.date)+'</div>'
        +'<div class="tl-note">'+bdg(LC_LABEL[h.stage]||h.stage,'badge '+(LC_CLASS[h.stage]||'lc-unclear'))+' '+esc(h.note)+'</div>'
        +'<div class="tl-src">'+esc(h.source)+'</div>'
        +'</div>';
    }).join('')
    :'<p style="color:var(--text3);font-size:12px">이력 없음</p>';
  document.getElementById('modal-overlay').classList.add('open');
}

// ── stats ──
function updateStats(){
  var total=REG.length, ch=REG.filter(function(r){return r.changed_this_week;}).length;
  document.getElementById('total-badge').textContent='전체 '+total+'건';
  document.getElementById('changed-badge').textContent='이번 주 '+ch+'건 변경';
  var dates=REG.map(function(r){return r.checked_at;}).filter(Boolean).sort();
  if(dates.length) document.getElementById('last-updated').textContent='최근 갱신: '+dates.pop();
}
function updateCountBar(n){
  document.getElementById('count-bar').textContent='표시 '+n+'건 / 전체 '+REG.length+'건';
}

// ── events ──
document.getElementById('domain-filters').addEventListener('click',function(e){
  var b=e.target.closest('[data-domain]');
  if(!b)return;
  activeDomain=b.dataset.domain;
  document.querySelectorAll('[data-domain]').forEach(function(x){x.classList.toggle('active',x===b);});
  render();
});
document.getElementById('country-filters').addEventListener('click',function(e){
  var b=e.target.closest('[data-country]');
  if(!b)return;
  activeCountry=b.dataset.country;
  document.querySelectorAll('[data-country]').forEach(function(x){x.classList.toggle('active',x===b);});
  render();
});
document.getElementById('btn-card').addEventListener('click',function(){
  currentView='card';
  document.getElementById('card-view').style.display='block';
  document.getElementById('table-view').style.display='none';
  document.getElementById('btn-card').classList.add('active');
  document.getElementById('btn-table').classList.remove('active');
  render();
});
document.getElementById('btn-table').addEventListener('click',function(){
  currentView='table';
  document.getElementById('card-view').style.display='none';
  document.getElementById('table-view').style.display='block';
  document.getElementById('btn-card').classList.remove('active');
  document.getElementById('btn-table').classList.add('active');
  render();
});
document.getElementById('btn-theme').addEventListener('click',function(){
  isDark=!isDark;
  document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
  this.textContent=isDark?'☀️ 라이트':'🌙 다크';
});
document.getElementById('modal-close').addEventListener('click',function(){
  document.getElementById('modal-overlay').classList.remove('open');
});
document.getElementById('modal-overlay').addEventListener('click',function(e){
  if(e.target===this)this.classList.remove('open');
});

function render(){
  if(currentView==='card')renderCards();else renderTable();
}

// ── boot ──
updateStats();
render();
</script>
</body>
</html>
