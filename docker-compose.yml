# SENTINEL — reg-watch 단독 운영 스택
# (n8n은 기존 인프라 재사용 → 이 파일에서는 reg-watch만 띄운다)
#
# 실행:  docker compose up -d --build
#
# 시크릿/수신자/회사 도메인은 이 파일에 하드코딩하지 않는다.
#   - reg-watch 관련 비밀(ANTHROPIC_API_KEY, DIGEST_RECIPIENTS 등)은 .env 에서만 주입.
#   - n8n SMTP 자격증명은 기존 n8n UI(Credentials)에서 바인딩.
#
# ★ 기존 n8n → reg-watch 호출 경로:
#   둘은 서로 다른 docker 스택이므로 'reg-watch' 호스트명으로는 못 부른다.
#   reg-watch가 호스트 포트 8010 으로 노출되고, 기존 n8n 컨테이너는
#   http://host.docker.internal:8010 으로 호출한다. (워크플로우 JSON에 반영됨)

services:
  reg-watch:
    build:
      context: .
      dockerfile: Dockerfile
    image: sentinel/reg-watch:latest
    container_name: sentinel-reg-watch
    env_file:
      - .env                      # 모든 비밀/설정은 여기서만
    ports:
      - "8010:8010"               # 호스트로 노출 → 기존 n8n이 host.docker.internal:8010 으로 호출
    volumes:
      - regwatch_state:/app/data/state   # 주간 스냅샷/레지스트리 이력 영속화
    restart: unless-stopped

  # --- 기존 n8n을 재사용하므로 아래 n8n 서비스는 비활성 상태로 둔다. ---
  # 별도의 새 n8n이 필요해지면 이 블록과 volumes의 n8n_data 주석을 해제하고,
  # 워크플로우 JSON의 호출 주소를 http://reg-watch:8010 으로 되돌린 뒤 같은 네트워크에 묶을 것.
  #
  # n8n:
  #   image: n8nio/n8n:latest
  #   container_name: sentinel-n8n
  #   ports:
  #     - "5678:5678"
  #   environment:
  #     - GENERIC_TIMEZONE=Asia/Seoul
  #     - TZ=Asia/Seoul
  #     - WEBHOOK_URL=http://100.65.141.65:5678/
  #     - N8N_EDITOR_BASE_URL=http://100.65.141.65:5678/
  #   volumes:
  #     - n8n_data:/home/node/.n8n
  #   restart: unless-stopped
  #   depends_on:
  #     - reg-watch

volumes:
  regwatch_state:
  # n8n_data:
